services:
  db:
    # PG17 to match the existing local `digygo_pgdata` volume (initialized by PG17).
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      # These only apply on a FRESH volume; the existing volume was created with
      # user digygo_user / db digygocrm, so we mirror them here.
      POSTGRES_DB: digygocrm
      POSTGRES_USER: digygo_user
      POSTGRES_PASSWORD: digygo123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digygo_user -d digygocrm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # appendonly = jobs/queues survive a restart. noeviction is required by BullMQ
    # so queued jobs are never silently dropped under memory pressure; the app's
    # cache uses TTLs and falls back to in-memory if a write is ever rejected.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://digygo_user:digygo123@db:5432/digygocrm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_prod
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      # SMTP is read from the gitignored root .env (never hardcode the secret here).
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Hawcus CRM}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL:-}"
      SUPPORT_EMAIL: "${SUPPORT_EMAIL:-hello@hawcus.com}"
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000
      # inotify doesn't cross a Windows->Linux bind mount, so poll for Vite HMR.
      CHOKIDAR_USEPOLLING: "true"
    # Live-edit: mount the source, but keep the image's (linux) node_modules.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  pgdata:
  redisdata:
